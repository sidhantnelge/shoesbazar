<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orders - SHOEBAZAR</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet'>
  <style>
    body { background-color: #121212; color: white; }
    .orders-wrapper { padding-top: 80px; min-height: 100vh; }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container2">

      <!-- LEFT: Nav Links (desktop) -->
      <div class="navbar-left">
        <ul class="navbar-nav">
          <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="shoes.html" class="nav-link">Shoes</a></li>
          <li class="nav-item"><a href="orders.html" class="nav-link active">My Orders <span id="cart-count" class="badge bg-danger rounded-pill">0</span></a></li>
          <li class="nav-item"><a href="login.html" class="nav-link">Login</a></li>
        </ul>
      </div>

      <!-- CENTER: Brand Logo -->
      <a class="navbar-brand" href="index.html">Shoebazar</a>

      <!-- RIGHT: Search + Mobile Toggler -->
      <div class="navbar-right">
        <form class="d-none d-lg-flex" role="search" onsubmit="handleSearch(event)">
          <input class="form-control me-2 bg-dark text-white border-secondary" type="search" id="searchInput" placeholder="Search shoes..." aria-label="Search">
          <button class="btn btn-outline-light" type="submit">Search</button>
        </form>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>

      <!-- Mobile Collapse Menu -->
      <div class="collapse navbar-mobile-menu" id="menu">
        <ul class="navbar-nav">
          <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="shoes.html" class="nav-link">Shoes</a></li>
          <li class="nav-item"><a href="orders.html" class="nav-link active">My Orders <span class="badge bg-danger rounded-pill">0</span></a></li>
          <li class="nav-item"><a href="login.html" class="nav-link">Login</a></li>
        </ul>
        <form class="nav-search d-flex" role="search" onsubmit="handleSearch(event)">
          <input class="form-control me-2 bg-dark text-white border-secondary" type="search" id="searchInputMobile" placeholder="Search shoes..." aria-label="Search">
          <button class="btn btn-outline-light" type="submit">Search</button>
        </form>
      </div>

    </div>
  </nav>

  <div class="orders-wrapper container">
    <h2 class="text-center mt-5 mb-4" style="font-size: 2.5rem; font-family: 'Pacifico';">Shopping Cart</h2>
    
    <div class="row">
      <div class="col-md-8">
        <div id="orders-container">
          <!-- Filled via JS -->
        </div>
      </div>
      
      <div class="col-md-4">
        <div id="checkout-panel" class="bg-dark p-4 rounded border border-secondary" style="display: none;">
          <h4 style="font-family: sans-serif; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px;">Order Summary</h4>
          <div class="d-flex justify-content-between mb-3 text-white" style="font-family: sans-serif;">
            <span>Subtotal</span>
            <span id="total-price" style="font-weight: bold;">€0</span>
          </div>
          <div class="d-flex justify-content-between mb-4 text-white" style="font-family: sans-serif;">
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <a href="payment.html" class="btn btn-primary w-100 login-btn" style="font-family: sans-serif;">Proceed to Checkout</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
